<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>デッキ構築 - バディファイト試作アプリ</title>
    <link rel="stylesheet" href="styles.css?v=20260710g" />
    <script>
      // テーマbootstrap(描画前にdata-themeを確定しFOUC回避)。3画面共通。
      (function () {
        try {
          var saved = localStorage.getItem("bf-theme");
          if (saved === "light" || saved === "dark") {
            document.documentElement.setAttribute("data-theme", saved);
          }
        } catch (e) {}
        function effective() {
          return (
            document.documentElement.getAttribute("data-theme") ||
            (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
          );
        }
        window.updateThemeToggleIcon = function () {
          var btn = document.getElementById("themeToggle");
          if (!btn) return;
          var mode = effective();
          btn.textContent = mode === "light" ? "\u{1F319}" : "\u2600\uFE0F";
          btn.setAttribute("aria-label", mode === "light" ? "ダークモードに切替" : "ライトモードに切替");
          btn.setAttribute("aria-pressed", mode === "light" ? "true" : "false");
        };
        window.toggleTheme = function () {
          var next = effective() === "light" ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", next);
          try { localStorage.setItem("bf-theme", next); } catch (e) {}
          window.updateThemeToggleIcon();
        };
        document.addEventListener("DOMContentLoaded", window.updateThemeToggleIcon);
      })();
    </script>
    <link rel="stylesheet" href="builder.css?v=20260710b" />
  </head>
  <body>
    <main class="app-shell builder-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">デッキ構築ツール</p>
          <h1>デッキ構築</h1>
        </div>
        <div class="toolbar" aria-label="画面操作">
          <a class="toolbar-link" href="index.html">ローカル対戦</a>
          <a class="toolbar-link" href="play.html">ネット対戦</a>
          <button id="newDeckButton" type="button">新規</button>
          <!-- 開く…: #savedDeckSelect は隠し値置き場。deck-picker.js が同 id を見つけて選択ボタンを afterend に付ける（DOM移動でボタンも追随）。picker 選択(=change)で即読込。 -->
          <span class="open-deck">
            <select id="savedDeckSelect" aria-label="デッキ"></select>
          </span>
          <!-- 保存 スプリット: 既定=この端末に保存(#saveDeckButton)、▾で保存先メニュー -->
          <span class="save-split">
            <button id="saveDeckButton" type="button">保存</button>
            <button id="saveMenuButton" type="button" class="save-menu-toggle" aria-haspopup="true" aria-expanded="false" aria-label="保存メニュー">▾</button>
            <div id="saveMenu" class="save-menu" role="menu" hidden>
              <button type="button" id="saveLocalMenuItem" role="menuitem">この端末に保存</button>
              <button type="button" id="saveServerMenuItem" role="menuitem">サーバーに保存</button>
            </div>
          </span>
          <span class="toolbar-spacer" aria-hidden="true"></span>
          <div id="accountControl" class="account-control-slot"></div>
          <button type="button" id="themeToggle" class="theme-toggle" onclick="toggleTheme()" aria-label="テーマ切替">☀️</button>
          <button type="button" class="mobile-only nav-toggle" aria-expanded="false" onclick="document.body.classList.toggle('nav-open'); this.setAttribute('aria-expanded', document.body.classList.contains('nav-open'))" aria-label="メニュー">☰</button>
        </div>
      </header>

      <section class="builder-grid" aria-label="デッキ構築">
        <section class="builder-panel deck-settings" aria-label="デッキ設定">
          <div class="panel-head">
            <h2>デッキ</h2>
            <strong id="deckCountLabel">0枚</strong>
          </div>
          <label class="field-label">
            <span>デッキ名</span>
            <input id="deckNameInput" type="text" value="新しいデッキ" />
          </label>
          <label class="field-label">
            <span>フラッグ</span>
            <select id="flagSelect"></select>
          </label>
          <label class="field-label">
            <span>バディ</span>
            <select id="buddySelect"></select>
          </label>
          <div class="deck-stats" id="deckStats"></div>
          <div class="validation-list" id="validationList"></div>
        </section>

        <section class="builder-panel search-panel" aria-label="カード検索">
          <div class="panel-head">
            <h2>カード検索</h2>
            <strong id="resultCountLabel">0件</strong>
          </div>
          <!-- 世代タブ: 製品が増えても製品リストを世代で先に絞れる。1世代のみのうちは非表示(JS) -->
          <div id="generationTabs" class="generation-tabs" role="tablist" aria-label="世代で絞り込み"></div>
          <div class="search-controls">
            <input id="searchInput" type="search" placeholder="カード名・番号・属性" />
            <select id="typeFilter" aria-label="種類"></select>
            <select id="worldFilter" aria-label="ワールド"></select>
            <select id="productFilter" aria-label="製品"></select>
          </div>
          <div class="card-results" id="cardResults"></div>
        </section>

        <section class="builder-panel deck-list-panel" aria-label="採用カード">
          <div class="panel-head">
            <h2>採用カード</h2>
            <button id="sortDeckButton" type="button">整列</button>
          </div>
          <div class="deck-list" id="deckList"></div>
        </section>

        <details class="builder-panel import-panel io-tools" aria-label="共有・バックアップ">
          <summary class="io-tools-summary">共有・バックアップ</summary>
          <div class="io-tools-body">
            <div class="io-actions">
              <button id="issueShareCodeButton" type="button">共有コード発行</button>
              <button id="importShareCodeButton" type="button">共有コード取込</button>
              <button id="copyShareUrlButton" type="button">共有URLをコピー</button>
            </div>
            <input id="shareCodeInput" type="text" spellcheck="false" placeholder="BFD1.… デッキ共有コード（持ち寄り用）" class="share-code-input" />
            <div class="io-actions">
              <button id="exportDeckButton" type="button">エクスポート</button>
              <button id="importDeckButton" type="button">インポート</button>
              <button id="downloadDeckButton" type="button">JSON保存</button>
            </div>
            <textarea id="deckJsonText" spellcheck="false"></textarea>
            <div class="io-actions">
              <button id="deleteSavedDeckButton" type="button">選択中の保存デッキを削除</button>
            </div>
            <p class="status-text" id="builderStatus">カードデータ読込中</p>
          </div>
        </details>
      </section>
      <div id="toast" role="status" aria-live="polite" aria-hidden="true"></div>
    </main>
    <script>
      // データJSON(loadJson)を ?v= 付きURL＋ブラウザキャッシュに載せる（初期ロード最適化 D2）。
      // builder は ENGINE_VERSION ローダを使わないので、下の ?v= と同じ値を手書きで揃える。
      window.__BUDDYFIGHT_DATA_VERSION = "20260715b";
    </script>
    <!-- deck-code.js: BFD1 共有コードの encode/decode/validate（サーバと共通）。builder.js より前に読み込み、
         builder.js は自前の重複実装を廃してこのグローバル関数を使う（一本化）。 -->
    <script src="deck-code.js?v=20260710b"></script>
    <script src="builder.js?v=20260710d"></script>
    <script src="deck-picker.js?v=20260710i"></script>
    <script src="user-api.js?v=20260710b"></script>
  </body>
</html>
