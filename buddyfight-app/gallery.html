<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>カードギャラリー - バディファイト試作アプリ</title>
    <link rel="stylesheet" href="styles.css?v=20260710g" />
    <script>
      // テーマbootstrap(描画前にdata-themeを確定しFOUC回避)。3画面共通。
      (function () {
        try {
          var saved = localStorage.getItem("bf-theme");
          if (saved === "light" || saved === "dark") {
            document.documentElement.setAttribute("data-theme", saved);
          }
        } catch (e) {}
        function effective() {
          return (
            document.documentElement.getAttribute("data-theme") ||
            (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
          );
        }
        window.updateThemeToggleIcon = function () {
          var btn = document.getElementById("themeToggle");
          if (!btn) return;
          var mode = effective();
          btn.textContent = mode === "light" ? "\u{1F319}" : "☀️";
          btn.setAttribute("aria-label", mode === "light" ? "ダークモードに切替" : "ライトモードに切替");
          btn.setAttribute("aria-pressed", mode === "light" ? "true" : "false");
        };
        window.toggleTheme = function () {
          var next = effective() === "light" ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", next);
          try { localStorage.setItem("bf-theme", next); } catch (e) {}
          window.updateThemeToggleIcon();
        };
        document.addEventListener("DOMContentLoaded", window.updateThemeToggleIcon);
      })();
    </script>
    <link rel="stylesheet" href="gallery.css?v=20260710b" />
  </head>
  <body>
    <main class="app-shell gallery-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">カード図鑑</p>
          <h1>カードギャラリー</h1>
        </div>
        <div class="toolbar" aria-label="画面操作">
          <a class="toolbar-link" href="index.html">ローカル対戦</a>
          <a class="toolbar-link" href="builder.html">デッキ構築</a>
          <a class="toolbar-link" href="play.html">ネット対戦</a>
          <button type="button" id="themeToggle" class="theme-toggle" onclick="toggleTheme()" aria-label="テーマ切替">☀️</button>
        </div>
      </header>

      <section class="gallery-controls" aria-label="カード検索">
        <div class="panel-head">
          <h2>カード検索</h2>
          <strong id="galleryCount">0枚</strong>
        </div>
        <div id="galleryGenerations" class="generation-tabs" role="tablist" aria-label="世代で絞り込み"></div>
        <div class="gallery-filter-row">
          <input id="gallerySearch" type="search" placeholder="カード名・番号・属性" />
          <select id="galleryType" aria-label="種類"></select>
          <select id="galleryWorld" aria-label="ワールド"></select>
          <select id="galleryProduct" aria-label="製品"></select>
          <select id="galleryRarity" aria-label="レアリティ"></select>
        </div>
      </section>

      <section class="gallery-results-panel" aria-label="カード一覧">
        <div id="galleryResults" class="gallery-results"></div>
        <nav id="galleryPager" class="gallery-pager" aria-label="ページ送り"></nav>
        <p class="status-text" id="galleryStatus">カードデータ読込中</p>
      </section>
    </main>

    <!-- カード詳細モーダル（拡大画像＋rules全文＋ステータス） -->
    <div id="galleryModal" class="gallery-modal" role="dialog" aria-modal="true" aria-labelledby="galleryModalTitle" hidden>
      <div class="gallery-modal-panel">
        <button type="button" id="galleryModalClose" class="gallery-modal-close" aria-label="閉じる">✕</button>
        <div id="galleryModalBody" class="gallery-modal-content"></div>
      </div>
    </div>

    <script>
      // データJSON(loadJson)を ?v= 付きURL＋ブラウザキャッシュに載せる（初期ロード最適化 D2）。
      // gallery は ENGINE_VERSION ローダを使わないので、上の ?v= と同じ値を手書きで揃える。
      window.__BUDDYFIGHT_DATA_VERSION = "20260714c";
    </script>
    <script src="gallery.js?v=20260714c"></script>
  </body>
</html>
